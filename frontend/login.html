<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Steno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body.login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #faf9f5;
      color: #3d3929;
      font-family: "Inter", -apple-system, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
    }
    .login-wordmark {
      display: block;
      text-align: center;
      font-family: "Pacifico", cursive;
      font-size: 2.4rem;
      color: #cc785c;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }
    .login-card .card {
      background: #ffffff;
      border: 1px solid #e5e1d8;
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(61, 57, 41, 0.06), 0 4px 16px rgba(61, 57, 41, 0.05);
    }
    .login-card label {
      color: #3d3929;
    }
    .login-card input[type="text"],
    .login-card input[type="password"] {
      background: #faf9f5;
      border: 1px solid #e5e1d8;
      border-radius: 8px;
      color: #3d3929;
    }
    .login-card input[type="text"]:focus,
    .login-card input[type="password"]:focus {
      outline: none;
      border-color: #cc785c;
      box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.12);
    }
    .login-card button {
      width: 100%;
      background: #cc785c;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
    }
    .login-card button:hover {
      background: #b15e42;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <a href="login.html" class="login-wordmark">Steno</a>
    <div class="card">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" autocomplete="username" />
      <label for="login-password">Password</label>
      <input type="password" id="login-password" autocomplete="current-password" />
      <button id="login-btn">Log In</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="api.js"></script>
  <script>
    if (getToken()) {
      window.location.href = "index.html";
    }

    async function doLogin() {
      const btn = document.getElementById("login-btn");
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;
      if (!username || !password) {
        showToast("Enter username and password", "error");
        return;
      }
      setLoading(btn, true);
      try {
        const { access_token, user } = await apiLogin(username, password);
        setSession(access_token, user);
        window.location.href = "index.html";
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        setLoading(btn, false);
      }
    }

    document.getElementById("login-btn").addEventListener("click", doLogin);
    document.getElementById("login-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>

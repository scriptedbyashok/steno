<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Steno Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="home.css" />
</head>
<body class="home">
  <div class="home-wrap">
    <div class="masthead">
      <div class="mark" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <rect class="bar" x="1" y="6" width="3" height="10" rx="1"></rect>
          <rect class="bar" x="6.5" y="2" width="3" height="16" rx="1"></rect>
          <rect class="bar" x="12" y="8" width="3" height="8" rx="1"></rect>
          <rect class="bar" x="17" y="4" width="2" height="14" rx="1"></rect>
        </svg>
      </div>
      <h1>Dictation Practice</h1>
    </div>
    <p class="tagline">Listen closely. Type what you hear. See exactly where it broke down.</p>

    <div class="home-grid" id="card-list"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="api.js"></script>
  <script>
    function formatTimeLimit(seconds) {
      if (!seconds) return "Untimed";
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function waveIconSvg() {
      return `
        <svg width="18" height="18" viewBox="0 0 20 20" aria-hidden="true">
          <rect class="bar" x="1" y="6" width="3" height="10" rx="1"></rect>
          <rect class="bar" x="6.5" y="2" width="3" height="16" rx="1"></rect>
          <rect class="bar" x="12" y="8" width="3" height="8" rx="1"></rect>
          <rect class="bar" x="17" y="4" width="2" height="14" rx="1"></rect>
        </svg>
      `;
    }

    async function loadCards() {
      const listEl = document.getElementById("card-list");
      listEl.innerHTML = `<div class="status-line">${spinnerHtml("Loading dictations…")}</div>`;
      try {
        const dictations = await apiGetDictations();
        if (!dictations.length) {
          listEl.innerHTML =
            '<p class="status-line">No dictations yet. Check back soon!</p>';
          return;
        }
        listEl.innerHTML = "";
        dictations.forEach((d) => {
          const isTimed = Boolean(d.time_limit_seconds);
          const card = document.createElement("div");
          card.className = "dict-card";
          card.tabIndex = 0;
          card.setAttribute("role", "button");
          card.setAttribute("aria-label", `Open ${d.title}`);

          const statsLine =
            d.attempt_count > 0
              ? `Best <span class="accuracy">${d.best_accuracy}%</span> &middot; Last ${formatDate(d.last_attempt_at)}`
              : "No attempts yet";

          card.innerHTML = `
            <div class="card-top">
              <div class="wave-icon">${waveIconSvg()}</div>
              <h2>${d.title}</h2>
            </div>
            <div class="badge-row">
              <span class="badge ${isTimed ? "timed" : "untimed"}">${isTimed ? "⏱ " + formatTimeLimit(d.time_limit_seconds) : "untimed"}</span>
              <span class="badge">${d.word_count} words</span>
              <span class="badge">${d.attempt_count} attempt${d.attempt_count === 1 ? "" : "s"}</span>
            </div>
            <p class="card-stats">${statsLine}</p>
          `;

          const go = () => {
            window.location.href = `test.html?id=${d.id}`;
          };
          card.addEventListener("click", go);
          card.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              go();
            }
          });
          listEl.appendChild(card);
        });
      } catch (err) {
        listEl.innerHTML = '<p class="status-line">Failed to load dictations.</p>';
        showToast(err.message, "error");
      }
    }

    loadCards();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload — Steno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-theme.css" />
</head>
<body class="admin-theme">
  <header id="navbar-root" class="navbar"></header>

  <div class="container">
    <h1>Dictation Admin</h1>

    <section class="card">
      <h2 style="margin-top: 0">Upload New Dictation</h2>
      <form id="upload-form">
        <label for="upload-title">Title</label>
        <input type="text" id="upload-title" required />

        <label for="upload-audio">Audio file (mp3, wav, m4a — max 25MB)</label>
        <input type="file" id="upload-audio" accept=".mp3,.wav,.m4a" required />

        <label for="upload-transcript">Transcript</label>
        <textarea id="upload-transcript" required></textarea>

        <div class="toggle-row">
          <input type="checkbox" id="timed-toggle" />
          <label for="timed-toggle">Timed test?</label>
        </div>
        <div id="time-limit-wrap" style="display: none">
          <label for="time-limit">Time limit (seconds)</label>
          <input type="number" id="time-limit" min="1" />
        </div>

        <button type="submit" id="upload-btn">Upload</button>
      </form>
    </section>

    <section class="card">
      <h2 style="margin-top: 0">Existing Dictations</h2>
      <div id="dictation-list">Loading…</div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="api.js"></script>
  <script>
    async function init() {
      const user = await requireAuth({ adminOnly: true });
      if (!user) return;
      renderNavbar(user, "config");
      loadDictationList();
    }

    document.getElementById("timed-toggle").addEventListener("change", (e) => {
      document.getElementById("time-limit-wrap").style.display = e.target.checked
        ? "block"
        : "none";
    });

    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("upload-btn");
      const title = document.getElementById("upload-title").value.trim();
      const transcript = document.getElementById("upload-transcript").value.trim();
      const fileInput = document.getElementById("upload-audio");
      const isTimed = document.getElementById("timed-toggle").checked;
      const timeLimit = document.getElementById("time-limit").value;

      if (!fileInput.files.length) {
        showToast("Choose an audio file", "error");
        return;
      }

      const formData = new FormData();
      formData.append("audio", fileInput.files[0]);
      formData.append("title", title);
      formData.append("transcript", transcript);
      if (isTimed && timeLimit) {
        formData.append("time_limit_seconds", timeLimit);
      }

      setLoading(btn, true);
      try {
        await apiUploadDictation(formData);
        showToast("Dictation uploaded", "success");
        e.target.reset();
        document.getElementById("time-limit-wrap").style.display = "none";
        loadDictationList();
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        setLoading(btn, false);
      }
    });

    async function loadDictationList() {
      const listEl = document.getElementById("dictation-list");
      listEl.innerHTML = spinnerHtml("Loading dictations…");
      try {
        const dictations = await apiGetDictations();
        if (!dictations.length) {
          listEl.textContent = "No dictations yet.";
          return;
        }
        listEl.innerHTML = "";
        dictations.forEach((d) => {
          const row = document.createElement("div");
          row.className = "dictation-row";
          row.innerHTML = `<span>${d.title}</span>`;
          const delBtn = document.createElement("button");
          delBtn.className = "danger";
          delBtn.textContent = "Delete";
          delBtn.style.marginTop = "0";
          delBtn.addEventListener("click", () => deleteDictation(d.id, d.title));
          row.appendChild(delBtn);
          listEl.appendChild(row);
        });
      } catch (err) {
        listEl.textContent = "Failed to load dictations.";
        showToast(err.message, "error");
      }
    }

    async function deleteDictation(id, title) {
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
      try {
        await apiDeleteDictation(id);
        showToast("Deleted", "success");
        loadDictationList();
      } catch (err) {
        showToast(err.message, "error");
      }
    }

    init();
  </script>
</body>
</html>

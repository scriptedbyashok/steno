<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload — Steno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-theme.css" />
</head>
<body class="admin-theme">
  <header id="navbar-root" class="navbar"></header>

  <div class="container">
    <h1>Dictation Admin</h1>

    <section class="card">
      <h2 style="margin-top: 0">Upload New Dictation</h2>
      <form id="upload-form">
        <label for="upload-title">Title</label>
        <input type="text" id="upload-title" required />

        <label for="upload-audio">Audio file (mp3, wav, m4a — max 25MB)</label>
        <input type="file" id="upload-audio" accept=".mp3,.wav,.m4a" required />

        <label for="upload-transcript">Transcript</label>
        <textarea id="upload-transcript" required></textarea>

        <div class="toggle-row">
          <input type="checkbox" id="timed-toggle" />
          <label for="timed-toggle">Timed test?</label>
        </div>
        <div id="time-limit-wrap" style="display: none">
          <label for="time-limit">Time limit (seconds)</label>
          <input type="number" id="time-limit" min="1" />
        </div>

        <button type="submit" id="upload-btn">Upload</button>
      </form>
    </section>

    <section class="card">
      <h2 style="margin-top: 0">Existing Dictations</h2>
      <div id="dictation-list">Loading…</div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="api.js"></script>
  <script>
    async function init() {
      const user = await requireAuth({ adminOnly: true });
      if (!user) return;
      renderNavbar(user, "config");
      loadDictationList();
    }

    document.getElementById("timed-toggle").addEventListener("change", (e) => {
      document.getElementById("time-limit-wrap").style.display = e.target.checked
        ? "block"
        : "none";
    });

    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("upload-btn");
      const title = document.getElementById("upload-title").value.trim();
      const transcript = document.getElementById("upload-transcript").value.trim();
      const fileInput = document.getElementById("upload-audio");
      const isTimed = document.getElementById("timed-toggle").checked;
      const timeLimit = document.getElementById("time-limit").value;

      if (!fileInput.files.length) {
        showToast("Choose an audio file", "error");
        return;
      }

      const formData = new FormData();
      formData.append("audio", fileInput.files[0]);
      formData.append("title", title);
      formData.append("transcript", transcript);
      if (isTimed && timeLimit) {
        formData.append("time_limit_seconds", timeLimit);
      }

      setLoading(btn, true);
      try {
        await apiUploadDictation(formData);
        showToast("Dictation uploaded", "success");
        e.target.reset();
        document.getElementById("time-limit-wrap").style.display = "none";
        loadDictationList();
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        setLoading(btn, false);
      }
    });

    async function loadDictationList() {
      const listEl = document.getElementById("dictation-list");
      listEl.innerHTML = spinnerHtml("Loading dictations…");
      try {
        const dictations = await apiGetAdminDictations();
        renderDictationList(dictations);
      } catch (err) {
        listEl.textContent = "Failed to load dictations.";
        showToast(err.message, "error");
      }
    }

    function renderDictationList(dictations) {
      const listEl = document.getElementById("dictation-list");
      if (!dictations.length) {
        listEl.textContent = "No dictations yet.";
        return;
      }
      listEl.innerHTML = "";
      dictations.forEach((d) => {
        const row = document.createElement("div");
        row.className = "dictation-row";
        if (d.deleted_at) row.classList.add("dictation-row-deleted");

        row.innerHTML = `
          <div class="dictation-row-main">
            <span>${escapeHtml(d.title)}</span>
            ${d.deleted_at ? '<span class="deleted-badge">Deleted</span>' : ""}
            <span class="muted dictation-row-stats">${d.word_count} words · ${d.attempt_count} attempt${d.attempt_count === 1 ? "" : "s"}</span>
          </div>
          <div class="dictation-row-actions">
            ${
              d.deleted_at
                ? `<button class="secondary restore-btn" type="button">Restore</button>
                   <button class="danger delete-permanent-btn" type="button">Delete Permanently</button>`
                : `<button class="secondary edit-btn" type="button">Edit</button>
                   <button class="danger delete-btn" type="button">Delete</button>`
            }
          </div>
          <div class="edit-form" style="display: none"></div>
          <div class="delete-confirm-panel" style="display: none">
            <label class="delete-confirm-checkbox-row">
              <input type="checkbox" class="permanent-checkbox" />
              Permanently delete (cannot be undone)
            </label>
            <div class="delete-confirm-actions">
              <button type="button" class="danger confirm-delete-btn">Confirm Delete</button>
              <button type="button" class="secondary cancel-delete-btn">Cancel</button>
            </div>
          </div>
        `;

        if (!d.deleted_at) {
          const editForm = row.querySelector(".edit-form");
          row.querySelector(".edit-btn").addEventListener("click", async () => {
            if (editForm.style.display === "block") {
              editForm.style.display = "none";
              return;
            }
            editForm.style.display = "block";
            editForm.innerHTML = spinnerHtml("Loading…");
            try {
              const detail = await apiGetAdminDictation(d.id);
              renderEditForm(editForm, detail);
            } catch (err) {
              editForm.style.display = "none";
              showToast(err.message, "error");
            }
          });

          const deletePanel = row.querySelector(".delete-confirm-panel");
          const actionsEl = row.querySelector(".dictation-row-actions");
          row.querySelector(".delete-btn").addEventListener("click", () => {
            actionsEl.style.display = "none";
            deletePanel.style.display = "block";
          });
          row.querySelector(".cancel-delete-btn").addEventListener("click", () => {
            deletePanel.style.display = "none";
            actionsEl.style.display = "flex";
            row.querySelector(".permanent-checkbox").checked = false;
          });
          row.querySelector(".confirm-delete-btn").addEventListener("click", async () => {
            const permanent = row.querySelector(".permanent-checkbox").checked;
            try {
              await apiDeleteDictation(d.id, permanent);
              showToast(
                permanent ? "Dictation permanently deleted" : "Dictation deleted",
                "success"
              );
              loadDictationList();
            } catch (err) {
              showToast(err.message, "error");
            }
          });
        } else {
          row.querySelector(".restore-btn").addEventListener("click", async () => {
            try {
              await apiRestoreDictation(d.id);
              showToast("Dictation restored", "success");
              loadDictationList();
            } catch (err) {
              showToast(err.message, "error");
            }
          });
          row.querySelector(".delete-permanent-btn").addEventListener("click", async () => {
            if (
              !confirm(
                "Permanently delete this dictation and its audio file? This cannot be undone."
              )
            )
              return;
            try {
              await apiDeleteDictation(d.id, true);
              showToast("Dictation permanently deleted", "success");
              loadDictationList();
            } catch (err) {
              showToast(err.message, "error");
            }
          });
        }

        listEl.appendChild(row);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function renderEditForm(editForm, detail) {
      const isTimed = !!detail.time_limit_seconds;
      editForm.innerHTML = `
        <label>Title</label>
        <input type="text" class="edit-dictation-title" value="${escapeHtml(detail.title)}" />

        <label>Transcript</label>
        <textarea class="edit-dictation-transcript">${escapeHtml(detail.transcript)}</textarea>

        <div class="toggle-row">
          <input type="checkbox" class="edit-timed-toggle" ${isTimed ? "checked" : ""} />
          <label>Timed test?</label>
        </div>
        <div class="edit-time-limit-wrap" style="display: ${isTimed ? "block" : "none"}">
          <label>Time limit (seconds)</label>
          <input type="number" class="edit-time-limit" min="1" value="${
            detail.time_limit_seconds || ""
          }" />
        </div>

        <label>Replace audio (leave blank to keep current)</label>
        <input type="file" class="edit-audio" accept=".mp3,.wav,.m4a" />

        <button type="button" class="save-edit-btn">Save</button>
        <button type="button" class="secondary cancel-edit-btn">Cancel</button>
      `;

      editForm
        .querySelector(".edit-timed-toggle")
        .addEventListener("change", (e) => {
          editForm.querySelector(".edit-time-limit-wrap").style.display = e.target
            .checked
            ? "block"
            : "none";
        });

      editForm.querySelector(".cancel-edit-btn").addEventListener("click", () => {
        editForm.style.display = "none";
      });

      editForm.querySelector(".save-edit-btn").addEventListener("click", async () => {
        const title = editForm.querySelector(".edit-dictation-title").value.trim();
        const transcript = editForm
          .querySelector(".edit-dictation-transcript")
          .value.trim();
        const isTimedNow = editForm.querySelector(".edit-timed-toggle").checked;
        const timeLimit = editForm.querySelector(".edit-time-limit").value;
        const fileInput = editForm.querySelector(".edit-audio");

        const formData = new FormData();
        formData.append("title", title);
        formData.append("transcript", transcript);
        if (isTimedNow && timeLimit) {
          formData.append("time_limit_seconds", timeLimit);
        } else if (!isTimedNow) {
          formData.append("clear_time_limit", "true");
        }
        if (fileInput.files.length) {
          formData.append("audio", fileInput.files[0]);
        }

        try {
          await apiUpdateDictation(detail.id, formData);
          showToast("Dictation updated", "success");
          loadDictationList();
        } catch (err) {
          showToast(err.message, "error");
        }
      });
    }

    init();
  </script>
</body>
</html>
